<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ho'oponopono · Prática de Cura</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --gold: #c9a84c;
    --gold-light: #edd077;
    --gold-dim: #7a6030;
    --sage: #7a9e8a;
    --sky: #6a9ec4;
    --muted: #6a7080;
    --text: #e0d8c8;
    --text-dim: #9a9080;
    --bead-off: #3a4560;
    --bead-on: #c9a84c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(106,158,196,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 18px 14px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.5rem, 6vw, 2.1rem);
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.12em;
  }
  header p {
    font-size: clamp(0.9rem, 3.5vw, 1rem);
    color: var(--text-dim);
    font-style: italic;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  /* Toggle button */
  .btn-toggle {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold-dim);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.85rem, 3.2vw, 0.95rem);
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 7px 20px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 10px;
  }
  .btn-toggle:hover { border-color: var(--gold); color: var(--gold); }

  /* Japamala wrapper */
  .japamala-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    transition: opacity 0.5s, max-height 0.5s;
    overflow: hidden;
    max-height: 380px;
  }
  .japamala-wrapper.hidden {
    opacity: 0;
    max-height: 0 !important;
    pointer-events: none;
  }

  #japamala-svg {
    width: 100%;
    max-width: 340px;
    height: auto;
    filter: drop-shadow(0 0 16px rgba(201,168,76,0.1));
  }

  /* Divider */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 10px auto;
  }

  /* Counter */
  .counter-display {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 9vw, 3rem);
    color: var(--gold-light);
    letter-spacing: 0.06em;
    text-align: center;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin: 4px 0;
  }
  .counter-display .of108 {
    font-size: 0.42em;
    color: var(--text-dim);
  }

  /* Completion */
  .completion {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
    animation: fadeIn 0.8s ease;
    margin: 6px 0;
  }
  .completion.show { display: flex; }
  .completion .msg {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 4.5vw, 1.4rem);
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.08em;
  }
  .completion .sub {
    font-size: clamp(0.9rem, 3.5vw, 1rem);
    color: var(--sage);
    font-style: italic;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Chrono */
  .chrono-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 2px 0 14px;
  }
  .chrono-label {
    font-size: clamp(0.72rem, 2.8vw, 0.8rem);
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .chrono {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 4.5vw, 1.4rem);
    color: var(--text-dim);
    letter-spacing: 0.14em;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .btn {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.9rem, 3.5vw, 1rem);
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 13px 30px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    min-width: 120px;
  }
  .btn-iniciar {
    background: linear-gradient(135deg, var(--gold-light), var(--gold-dim));
    color: #0d0f14;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .btn-iniciar:hover:not(.started) {
    box-shadow: 0 4px 28px rgba(201,168,76,0.5);
    transform: translateY(-1px);
  }
  .btn-iniciar.started {
    opacity: 0.35;
    cursor: default;
    transform: none;
  }
  .btn-reiniciar {
    background: transparent;
    border: 1px solid rgba(106,158,196,0.45);
    color: var(--sky);
    font-size: clamp(0.9rem, 3.5vw, 1rem);
  }
  .btn-reiniciar:hover {
    border-color: var(--sky);
    background: rgba(106,158,196,0.08);
  }

  /* Touch hint */
  .touch-hint {
    font-size: clamp(0.82rem, 3.2vw, 0.9rem);
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.04em;
    text-align: center;
    margin: 4px 0 2px;
    transition: opacity 0.5s;
  }
  .touch-hint.fade { opacity: 0; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Ho'oponopono</h1>
    <p>Prática sagrada de cura e reconciliação</p>
  </header>

  <button class="btn-toggle" id="btnToggle" onclick="toggleJapamala()">✦ Ocultar japamala</button>

  <div class="japamala-wrapper" id="japaWrapper">
    <!-- SVG viewBox: 360x360 -->
    <svg id="japamala-svg" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="cb"/>
          <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowStrong">
          <feGaussianBlur stdDeviation="5" result="cb"/>
          <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Outer ring guide -->
      <circle cx="180" cy="180" r="164" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>

      <!-- Thread ring -->
      <circle cx="180" cy="180" r="145" fill="none" stroke="rgba(201,168,76,0.14)" stroke-width="1.5" stroke-dasharray="4 3"/>

      <!-- Beads -->
      <g id="beads-group"></g>

      <!-- Center mantras text (inside the ring) -->
      <text x="180" y="148" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="13.5" font-style="italic" fill="rgba(240,232,210,0.82)" letter-spacing="0.5">Sinto muito</text>
      <text x="180" y="168" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="13.5" font-style="italic" fill="rgba(240,232,210,0.82)" letter-spacing="0.5">Me perdoe</text>
      <text x="180" y="188" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="13.5" font-style="italic" fill="rgba(240,232,210,0.82)" letter-spacing="0.5">Eu te amo</text>
      <text x="180" y="208" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="13.5" font-style="italic" fill="rgba(240,232,210,0.82)" letter-spacing="0.5">Sou grato</text>

      <!-- Center decorative line -->
      <line x1="136" y1="220" x2="224" y2="220" stroke="rgba(201,168,76,0.25)" stroke-width="0.8"/>

      <!-- Sumeru (tap point) — bottom center for thumb comfort on mobile -->
      <g id="sumeru-group" onclick="tapBead()" style="cursor:pointer">
        <!-- Halo -->
        <circle cx="180" cy="338" r="22" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.18)" stroke-width="1"/>
        <!-- Main bead -->
        <circle id="sumeru" cx="180" cy="338" r="15" fill="#3a4560" stroke="rgba(201,168,76,0.35)" stroke-width="1.5"/>
        <!-- Inner shine -->
        <circle cx="175" cy="333" r="4" fill="rgba(255,255,255,0.07)"/>
        <!-- Ripple indicator -->
        <circle id="tap-indicator" cx="180" cy="338" r="15" fill="none" stroke="rgba(201,168,76,0.6)" stroke-width="1.5" opacity="0"/>
        <!-- Label -->
        <text x="180" y="342" text-anchor="middle" font-family="Cinzel,serif" font-size="5.5" fill="rgba(201,168,76,0.65)" letter-spacing="1.2">TOQUE</text>
      </g>

      <!-- Connector thread sumeru to ring -->
      <line x1="180" y1="323" x2="180" y2="289" stroke="rgba(201,168,76,0.25)" stroke-width="1.5"/>
    </svg>
  </div>

  <p class="touch-hint" id="touchHint">Toque na conta inferior do japamala para contar</p>

  <div class="divider"></div>

  <div class="counter-display">
    <span id="countNum">0</span>
    <span class="of108">/ 108</span>
  </div>

  <div class="completion" id="completion">
    <div class="msg">Concluído — Gratidão 🙏</div>
    <div class="sub">108 intenções enviadas ao universo</div>
  </div>

  <div class="chrono-area">
    <div class="chrono-label">Tempo de prática</div>
    <div class="chrono" id="chrono">00:00</div>
  </div>

  <div class="controls">
    <button class="btn btn-iniciar" id="btnIniciar" onclick="iniciar()">Iniciar</button>
    <button class="btn btn-reiniciar" onclick="reiniciar()">Reiniciar</button>
  </div>

</div>
<script>
const TOTAL = 108;
const CX = 180, CY = 180, RADIUS = 145, BEAD_R = 8.5;
let count = 0, started = false, finished = false;
let japaVisible = true, chronoInterval = null, chronoSec = 0;
let hintFaded = false;

// Instant color: off = slate, on = gold
const COLOR_OFF = '#3a4560';
const COLOR_ON  = '#c9a84c';

function buildBeads() {
  const g = document.getElementById('beads-group');
  g.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    // Start just after sumeru at bottom, go clockwise
    // Sumeru is at bottom (270° = bottom = +π/2)
    // Skip the bottom slot (sumeru), offset beads slightly
    const angle = ((i / TOTAL) * 2 * Math.PI) + (Math.PI / 2) + (2 * Math.PI / TOTAL / 2);
    const x = (CX + RADIUS * Math.cos(angle)).toFixed(2);
    const y = (CY + RADIUS * Math.sin(angle)).toFixed(2);
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', x);
    c.setAttribute('cy', y);
    c.setAttribute('r', BEAD_R);
    c.setAttribute('fill', COLOR_OFF);
    c.setAttribute('stroke', 'rgba(201,168,76,0.12)');
    c.setAttribute('stroke-width', '0.8');
    c.setAttribute('id', `bead-${i}`);
    g.appendChild(c);
  }
}

function updateBeads() {
  for (let i = 0; i < TOTAL; i++) {
    const el = document.getElementById(`bead-${i}`);
    if (!el) continue;
    if (i < count) {
      el.setAttribute('fill', COLOR_ON);
      el.setAttribute('stroke', i === count - 1 ? 'rgba(201,168,76,0.7)' : 'rgba(201,168,76,0.3)');
      el.setAttribute('stroke-width', i === count - 1 ? '1.8' : '0.8');
      el.setAttribute('filter', i === count - 1 ? 'url(#glow)' : '');
    } else {
      el.setAttribute('fill', COLOR_OFF);
      el.setAttribute('stroke', 'rgba(201,168,76,0.12)');
      el.setAttribute('stroke-width', '0.8');
      el.removeAttribute('filter');
    }
  }
  // Sumeru
  const sumeru = document.getElementById('sumeru');
  sumeru.setAttribute('fill', count > 0 ? COLOR_ON : COLOR_OFF);
  if (count > 0) sumeru.setAttribute('filter', 'url(#glowStrong)');
  else sumeru.removeAttribute('filter');
}

function tapBead() {
  if (!started || finished) return;
  count++;
  document.getElementById('countNum').textContent = count;
  updateBeads();
  animateRipple();
  if (!hintFaded) {
    document.getElementById('touchHint').classList.add('fade');
    hintFaded = true;
  }
  if (count >= TOTAL) finishPractice();
}

function animateRipple() {
  const el = document.getElementById('tap-indicator');
  let start = null;
  function step(ts) {
    if (!start) start = ts;
    const p = Math.min((ts - start) / 550, 1);
    el.setAttribute('r', 15 + p * 18);
    el.setAttribute('opacity', 0.75 * (1 - p));
    if (p < 1) requestAnimationFrame(step);
    else el.setAttribute('opacity', '0');
  }
  requestAnimationFrame(step);
}

function iniciar() {
  if (started) return;
  started = true;
  document.getElementById('btnIniciar').classList.add('started');
  chronoInterval = setInterval(() => {
    chronoSec++;
    const m = String(Math.floor(chronoSec / 60)).padStart(2,'0');
    const s = String(chronoSec % 60).padStart(2,'0');
    document.getElementById('chrono').textContent = `${m}:${s}`;
  }, 1000);
}

function reiniciar() {
  count = 0; started = false; finished = false;
  clearInterval(chronoInterval); chronoInterval = null; chronoSec = 0;
  hintFaded = false;
  document.getElementById('chrono').textContent = '00:00';
  document.getElementById('countNum').textContent = '0';
  document.getElementById('completion').classList.remove('show');
  document.getElementById('btnIniciar').classList.remove('started');
  document.getElementById('touchHint').classList.remove('fade');
  buildBeads(); updateBeads();
}

function finishPractice() {
  finished = true; started = false;
  clearInterval(chronoInterval); chronoInterval = null;
  document.getElementById('btnIniciar').classList.remove('started');
  document.getElementById('completion').classList.add('show');
  updateBeads();
}

function toggleJapamala() {
  japaVisible = !japaVisible;
  const w = document.getElementById('japaWrapper');
  const b = document.getElementById('btnToggle');
  if (japaVisible) {
    w.classList.remove('hidden');
    w.style.maxHeight = '380px';
    b.textContent = '✦ Ocultar japamala';
  } else {
    w.classList.add('hidden');
    b.textContent = '✦ Mostrar japamala';
  }
}

buildBeads();
updateBeads();
</script>
</body>
</html>
